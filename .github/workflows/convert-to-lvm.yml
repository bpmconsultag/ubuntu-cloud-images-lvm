name: Convert Ubuntu Cloud Image to LVM

on:
  workflow_dispatch:
  push:
    branches: [ '**' ]

jobs:
  convert-and-upload:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - version: "24.04"
            image_url: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
            image_file: "ubuntu-24.04-server-cloudimg-amd64.img"
            lvm_file: "lvm-ubuntu-24.04.qcow2"
          - version: "26.04"
            image_url: "https://cloud-images.ubuntu.com/releases/26.04/release/ubuntu-26.04-server-cloudimg-amd64.img"
            image_file: "ubuntu-26.04-server-cloudimg-amd64.img"
            lvm_file: "lvm-ubuntu-26.04.qcow2"
          - version: "26.04v3"
            image_url: "https://cloud-images.ubuntu.com/releases/26.04/release/ubuntu-26.04-server-cloudimg-amd64v3.img"
            image_file: "ubuntu-26.04-server-cloudimg-amd64v3.img"
            lvm_file: "lvm-ubuntu-26.04v3.qcow2"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lvm2 qemu-utils libguestfs-tools wget

      - name: Configure environment for libguestfs
        run: |
          # On Ubuntu the kernel image in /boot is mode 0600 (root only), so the
          # non-root libguestfs appliance cannot read it and supermin fails with
          # "cp: cannot open '/boot/vmlinuz-*' for reading: Permission denied".
          sudo chmod 0644 /boot/vmlinuz-*

          # Allow KVM access so libguestfs can use hardware acceleration;
          # without this it falls back to TCG (much slower).
          sudo chmod 0666 /dev/kvm || true

      - name: Download Ubuntu Cloud Image
        run: |
          wget -O ${{ matrix.image_file }} ${{ matrix.image_url }}

      - name: Convert image to LVM
        run: |
          chmod +x ./convert-image-to-lvm.sh
          export LIBGUESTFS_BACKEND=direct
          ./convert-image-to-lvm.sh ${{ matrix.image_file }} ${{ matrix.lvm_file }}

      - name: Upload LVM image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.lvm_file }}
          path: ${{ matrix.lvm_file }}
